name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build whenever you push to main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Build Production Assets
        run: npm run build

      - name: Deploy Production Bundle to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite compiles code into the 'dist' folder
          branch: gh-pages # Pushes the compiled static code into a safe deployment branch